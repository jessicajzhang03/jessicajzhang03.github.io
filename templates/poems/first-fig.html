{% extends "poem-base.html" %}
{% block title %}First Fig{% endblock %}
{% block text %}<div class="stanza"><p>My candle burns at both ends;</p><p style="margin-left:0.8999999999999999em;">It will not last the night;</p><p>But ah, my foes, and oh, my friends—</p><p style="margin-left:0.8999999999999999em;">It gives a lovely light!</p></div class="stanza">{% endblock %}
{% block author %}Edna St. Vincent Millay{% endblock %}
