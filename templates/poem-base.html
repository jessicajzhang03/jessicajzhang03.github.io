{% extends "base.html" %}

{% block content %} 
<div class="poem">
<h2 class="poem-title">
    {% block title %}{% endblock %}
</h2>

<div class="poem-text">
    {% block text %}{% endblock %}
</div> 

{% block extra %}{% endblock %}

<p class="poem-author">
    –{% block author %}{% endblock %}
</p>
</div>
{% endblock %}
