<div class="poem">
<h2 class="poem-title">
    First Fig
</h2>

<div class="poem-text">
    <div class="stanza"><p>My candle burns at both ends;</p><p style="margin-left:0.8999999999999999em;">It will not last the night;</p><p>But ah, my foes, and oh, my friends—</p><p style="margin-left:0.8999999999999999em;">It gives a lovely light!</p></div class="stanza">
</div> 



<p class="poem-author">
    –Edna St. Vincent Millay
</p>
